name: KaoriApp
options:
  bundleIdPrefix: com.kaori
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: "2.4.0"

targets:
  KaoriApp:
    type: application
    platform: iOS
    sources:
      - KaoriApp
    entitlements:
      path: KaoriApp/KaoriApp.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.security.application-groups:
          - group.com.dehuacheng.kaori
    info:
      path: KaoriApp/Info.plist
      properties:
        CFBundleDisplayName: "Kaori"
        NSCameraUsageDescription: "Kaori needs camera access to photograph your meals"
        NSPhotoLibraryUsageDescription: "Kaori needs photo library access to add meal photos"
        NSLocationWhenInUseUsageDescription: "Kaori uses your location to show local weather in your feed"
        NSHealthShareUsageDescription: "Kaori reads your weight history from Apple Health to track trends"
        NSHealthUpdateUsageDescription: "Kaori saves weight and workout data to Apple Health"
        NSSupportsLiveActivities: true
        BGTaskSchedulerPermittedIdentifiers:
          - com.dehuacheng.kaori.app.daily-summary
        UIBackgroundModes:
          - fetch
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    dependencies:
      - package: MarkdownUI
      - target: KaoriTimerWidgetExtension
        embed: true
      - target: KaoriShareExtension
        embed: true
    settings:
      base:
        GENERATE_INFOPLIST_FILE: false
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "0.1.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.dehuacheng.kaori.app
        SWIFT_EMIT_LOC_STRINGS: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: VEHZLU88DS

  KaoriTimerWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - KaoriTimerWidget
      - path: KaoriApp/Models/TimerActivity.swift
        type: file
    info:
      path: KaoriTimerWidget/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
        CFBundleDisplayName: Kaori Timer
    settings:
      base:
        GENERATE_INFOPLIST_FILE: false
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "0.1.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.dehuacheng.kaori.app.timer-widget
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: VEHZLU88DS
        SWIFT_EMIT_LOC_STRINGS: true

  KaoriAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - KaoriAppTests
    dependencies:
      - target: KaoriApp
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        PRODUCT_BUNDLE_IDENTIFIER: com.dehuacheng.kaori.app.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/KaoriApp.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/KaoriApp"
        BUNDLE_LOADER: "$(TEST_HOST)"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: VEHZLU88DS

  KaoriShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - KaoriShareExtension
      - path: KaoriApp/Config/SharedConfig.swift
        type: file
    entitlements:
      path: KaoriShareExtension/KaoriShareExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.dehuacheng.kaori
    info:
      path: KaoriShareExtension/Info.plist
      properties:
        CFBundleDisplayName: Kaori
        NSExtension:
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsImageWithMaxCount: 1
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).ShareViewController"
    settings:
      base:
        GENERATE_INFOPLIST_FILE: false
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "0.1.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.dehuacheng.kaori.app.share-extension
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: VEHZLU88DS
        SWIFT_EMIT_LOC_STRINGS: true
